<!-- login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - Grand Plaza Hotel</title>
  <link rel="stylesheet" href="style.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .login-container {
      background: white;
      padding: 2.5rem;
      border-radius: 15px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    
    .logo {
      font-size: 2rem;
      color: #667eea;
      margin-bottom: 0.5rem;
    }
    
    .login-container h2 {
      color: #333;
      margin-bottom: 0.5rem;
      font-size: 1.8rem;
    }
    
    .subtitle {
      color: #666;
      margin-bottom: 2rem;
      font-size: 0.9rem;
    }
    
    .form-group {
      margin-bottom: 1.5rem;
      text-align: left;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      color: #333;
      font-weight: 600;
      font-size: 0.9rem;
    }
    
    .form-group input {
      width: 100%;
      padding: 1rem;
      border: 2px solid #e1e5e9;
      border-radius: 8px;
      font-size: 1rem;
      transition: border-color 0.3s;
    }
    
    .form-group input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    
    .login-btn {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s;
      margin-bottom: 1.5rem;
    }
    
    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }
    
    .login-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    
    .divider {
      margin: 1.5rem 0;
      text-align: center;
      position: relative;
      color: #999;
    }
    
    .divider::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 1px;
      background: #e1e5e9;
    }
    
    .divider span {
      background: white;
      padding: 0 1rem;
    }
    
    .register-link {
      text-align: center;
    }
    
    .register-link p {
      color: #666;
      margin-bottom: 1rem;
    }
    
    .register-btn {
      display: inline-block;
      padding: 0.8rem 1.5rem;
      background: transparent;
      color: #667eea;
      border: 2px solid #667eea;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s;
    }
    
    .register-btn:hover {
      background: #667eea;
      color: white;
      transform: translateY(-2px);
    }
    
    .back-home {
      margin-top: 1.5rem;
      text-align: center;
    }
    
    .back-home a {
      color: #999;
      text-decoration: none;
      font-size: 0.9rem;
    }
    
    .back-home a:hover {
      color: #667eea;
    }
    
    @media (max-width: 480px) {
      .login-container {
        padding: 2rem 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">🏨</div>
    <h2>Welcome Back</h2>
    <p class="subtitle">Sign in to your Grand Plaza Hotel account</p>
    
    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required>
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required>
      </div>
      
      <button type="submit" class="login-btn">Sign In</button>
    </form>
    
    <div class="divider">
      <span>or</span>
    </div>
    
    <div class="register-link">
      <p>Don't have an account?</p>
      <a href="register.html" class="register-btn">Create Account</a>
    </div>
    
    <div class="back-home">
      <a href="index.html">← Back to Home</a>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const form = e.target;
      const email = form.email.value;
      const password = form.password.value;
      
      // Disable button during request
      const submitBtn = form.querySelector('button[type="submit"]');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Signing in...';

      try {
        const res = await fetch('http://localhost:3000/api/customer/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include', // Include session cookies
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (res.ok) {
          // Check if user was trying to book a room
          const selectedRoom = sessionStorage.getItem('selectedRoom');
          if (selectedRoom) {
            // User was booking a room, redirect to reservation page
            window.location.href = 'reservation.html';
          } else {
            // Normal login, redirect to dashboard
            window.location.href = 'dashboard.html';
          }
        } else {
          alert(data.error || 'Login failed');
        }
      } catch (err) {
        alert('Error connecting to server. Please try again.');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
